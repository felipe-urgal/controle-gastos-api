name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: controle-gastos-api
  ECS_CLUSTER: controle-gastos-cluster
  ECS_SERVICE: controle-gastos-api
  ECS_TASK_FAMILY: controle-gastos-api
  CONTAINER_NAME: api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::249608715352:role/github-actions-controle-gastos-api-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Render new task definition with the new image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

      - name: Discover new task public IP
        id: task-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --desired-status RUNNING \
            --query 'taskArns[0]' --output text)

          ENI_ID=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value | [0]' \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids "$ENI_ID" \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"

      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: felipe-urgal/controle-gastos-front
          ssh-key: ${{ secrets.FRONTEND_DEPLOY_KEY }}
          path: controle-gastos-front

      - name: Update API IP and push (triggers Vercel deploy)
        env:
          PUBLIC_IP: ${{ steps.task-ip.outputs.public_ip }}
        working-directory: controle-gastos-front
        run: |
          FILE="app/api/v1/[...path]/route.ts"
          sed -i -E "s#^const AWS_API = 'http://[0-9.]+:3001';#const AWS_API = 'http://${PUBLIC_IP}:3001';#" "$FILE"

          if git diff --quiet -- "$FILE"; then
            echo "IP não mudou, nada para atualizar."
            exit 0
          fi

          git config user.name "controle-gastos-api-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: atualiza IP da API após deploy do backend ($PUBLIC_IP)"
          git push origin HEAD:main
